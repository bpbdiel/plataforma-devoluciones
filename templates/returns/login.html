{% extends 'returns/base.html' %}
{% block full_page %}
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon-lg">↩</div>
      <div class="login-title">Devoluciones</div>
      <div class="login-sub">Inicia sesión para continuar</div>
    </div>
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-error" style="margin-bottom:16px">{{ message }}</div>
    {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group" style="margin-bottom:14px">
        <label>Usuario</label>
        <input type="text" name="username" class="form-input" placeholder="Tu usuario" autofocus required>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>Contraseña</label>
        <input type="password" name="password" class="form-input" placeholder="Tu contraseña" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Ingresar</button>
    </form>
  </div>
</div>
{% endblock %}
