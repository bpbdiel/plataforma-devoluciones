services:
  web:
    build: .
    container_name: plataforma-devoluciones
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-cambia-esta-clave-en-docker}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      SQLITE_PATH: /app/data/db.sqlite3
      DJANGO_MEDIA_ROOT: /app/media
      DJANGO_STATIC_ROOT: /app/staticfiles
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    restart: unless-stopped
